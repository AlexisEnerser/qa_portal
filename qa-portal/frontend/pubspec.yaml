name: qa_portal
description: Portal unificado de QA
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Estado + HTTP + navegación
  get: ^4.6.6

  # Almacenamiento local (token JWT)
  flutter_secure_storage: ^9.2.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2

  # Imágenes y archivos
  file_picker: ^8.1.4

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  data_table_2: ^2.5.14

  # Utilidades
  intl: ^0.19.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  web: ^1.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
